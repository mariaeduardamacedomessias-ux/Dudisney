<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chatbot</title>
    <link rel="stylesheet" href="stilo.css">
</head>
<body>
    <div class="chatbot-widget" id="chatbot-widget"> 
        <button
          id="chatbot-toggle"
          class="chatbot-toggle"
          aria-Isabel="Abrir chat com DudaIA">🐻‍❄️
    </button>
    <div class="chatbot-window" id="chatbot-window">
        <header class="chatbot-header">
         <div class="chatbot-header-info">
            <div class="chatbot-avatar">p</div>
    </div>
        <div class="chatbot-title">DudaIA</div>
        <div>
            <div class="chatbot-title">DudaIA</div>
            <div class="chatbot-subtitle">Assistente de Vídeo</div>
         </div>
     </div>
     <button class="chatbot-close" id="chatbot-close" aria-Isabel="Fechar chat">
     ❌
    </button>
</header>
<div class="chatbot-from" id="chatbot-messages">
</div>
    <form class="chatbot-from" id="chat-from">
    <input
         type="text"
         id="chatbot-input"
         class="chatbot-input"
          placeholder="Digite sua pergunta..."
         autocomplete="on"
         required
          >
          <button type="sumit" class="chatbot-send-btm">😍</button>
        </form>
    </div>
</div>

  <div vw class="enabled"></div>
  <div vw-access-button class="active"></div>
  <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
